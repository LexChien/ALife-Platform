prompt: "a swarm of flying birds"

foundation_model:
  name: random
  params:
    dim: 64
    seed: 7

substrate:
  name: boids
  params:
    num_boids: 50
    width: 128
    height: 128

runtime:
  steps: 32
  substeps: 1

search:
  iters: 2
  pop: 4
  keep: 4
  sigma: 0.1
  seed: 7
  theta_low: [0.5, 0.5, 0.5, 1.0, 1.0]
  theta_high: [2.0, 2.0, 2.0, 10.0, 5.0]
