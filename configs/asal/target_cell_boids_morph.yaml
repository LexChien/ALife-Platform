defaults:
  runtime_profile:
    device: auto
    precision: fp32
    backend: local
  tracking:
    enabled: false

prompt: "a microscopy image of a biological cell, phase contrast"

foundation_model:
  name: morphology_judge_stub
  params: {}

substrate:
  name: boids
  params:
    num_boids: 100
    width: 128
    height: 128

runtime:
  steps: 180
  substeps: 1

search:
  iters: 12
  pop: 16
  keep: 16
  sigma: 0.12
  seed: 7
  theta_low: [0.0, 0.0, 0.0, 18.0, 1.0]
  theta_high: [2.0, 2.0, 2.0, 128.0, 6.5]

profiles:
  cpu_smoke:
    runtime_profile:
      device: cpu
