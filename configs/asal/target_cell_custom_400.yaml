prompt: "a biological cell"

foundation_model:
  name: openclip
  params:
    model_name: "ViT-B-32"
    pretrained: "laion2b_s34b_b79k"

substrate:
  name: reaction_diffusion
  params:
    size: 128

runtime:
  steps: 400
  substeps: 2

search:
  iters: 15
  pop: 12
  keep: 12
  sigma: 0.03
  seed: 42
  theta_low: [0.10, 0.04, 0.01, 0.01, 1.0]
  theta_high: [0.25, 0.12, 0.10, 0.10, 1.0]
